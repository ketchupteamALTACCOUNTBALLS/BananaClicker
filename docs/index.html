<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity Web Player | Banana Clicker</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    #unity-canvas {
      width: 100vw;
      height: 100vh;
      display: block;
      background: #231F20;
    }

    #fs-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 9999;
      padding: 8px 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <button id="fs-btn">Fullscreen</button>

  <canvas id="unity-canvas" tabindex="-1"></canvas>

  <script src="banana.loader.js"></script>

  <script>
    createUnityInstance(document.querySelector("#unity-canvas"), {
      arguments: [],
      dataUrl: "banana.data",
      frameworkUrl: "banana.framework.js",
      codeUrl: "banana.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "Banana Clicker",
      productVersion: "1.0",
      matchWebGLToCanvasSize: true
    });

    // fullscreen button
    document.getElementById("fs-btn").onclick = () => {
      document.documentElement.requestFullscreen();
    };
  </script>

</body>
</html>
